<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Football Field Booking</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(27, 94, 32, 0.9);
            padding: 10px 20px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.6);
        }

        nav h1 {
            color: #ffffff;
            font-size: 24px;
            margin: 0;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #c8e6c9;
        }

        .slideshow-container {
            position: relative;
            max-width: 100%;
            height: 70vh;
            overflow: hidden;
        }

        .slide {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .active {
            display: block;
        }

        @keyframes fadeEffect {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slide.fade {
            animation: fadeEffect 1.5s;
        }

        .content {
            max-width: 800px;
            margin: 30px auto;
            text-align: center;
            color: #1b5e20;
        }

        .content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <nav>
        <h1>Football Field Booking</h1>
        <ul>
            <li><a href="homepage.html" style="background-color: #1b5e20; color: white; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-weight: bold;">HomePage</a></li>
            <li><a href="index.html">Booking</a></li>
            <li><a href="packages.html">Packages</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
           
    </nav>

    <div class="slideshow-container">
        <div class="slide active fade">
            <img src="img/732701ba-9009-4b58-a132-3acee15d9e0d.jpg" alt="Slide 1">
        </div>
        <div class="slide fade">
            <img src="img/ed633fc9-d63f-4e6d-a6ec-3a395a0a5a7d.jpg" alt="Slide 2">
        </div>
        <div class="slide fade">
            <img src="img/79eb17e0-884f-4419-9487-0d7b604484ec.jpg" alt="Slide 3">
        </div>
    </div>

    <div class="content">
        <h2>ยินดีต้อนรับสู่ระบบจองสนามฟุตบอล! </h2>
        <p>จองสนามฟุตบอลของคุณได้อย่างง่ายดายกับเรา แล้วสนุกกับเกมไปพร้อมกับเพื่อนและครอบครัว ค้นหาแพ็กเกจของเราและใช้เวลาบนสนามให้คุ้มค่าที่สุด!</p>
    </div>

    <script>
        let currentIndex = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlides() {
            slides.forEach((slide, index) => {
                slide.classList.remove('active');
                if (index === currentIndex) {
                    slide.classList.add('active');
                }
            });
            currentIndex = (currentIndex + 1) % slides.length;
        }

        // Change slide every 5 seconds
        setInterval(showSlides, 5000);
    </script>
</body>
</html>
