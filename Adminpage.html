<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Football Field Status</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #1b5e20, #4caf50);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
        }

        .back-button, .details-button {
            position: absolute;
            top: 10px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .back-button {
            left: 10px;
            background-color: #ff5252;
            color: white;
            border: none;
        }

        .details-button {
            right: 10px;
            background-color: #0288d1;
            color: white;
            border: none;
        }

        .back-button:hover {
            background-color: #d32f2f;
            transform: scale(1.05);
        }

        .details-button:hover {
            background-color: #01579b;
            transform: scale(1.05);
        }

        h2 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
        }

        th {
            background: rgba(27, 94, 32, 0.9);
            color: white;
        }

        td {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .available {
            background: rgba(76, 175, 80, 0.9);
            color: white;
            font-weight: bold;
            border-radius: 8px;
            padding: 10px;
        }

        .booked {
            background: rgba(244, 67, 54, 0.9);
            color: white;
            font-weight: bold;
            border-radius: 8px;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 8px;
            transition: all 0.3s ease-in-out;
            font-weight: bold;
        }

        .btn-available {
            background: #2e7d32;
            color: white;
        }

        .btn-booked {
            background: #d84315;
            color: white;
        }

        .btn-available:hover, .btn-booked:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .container {
                width: 95%;
            }

            th, td {
                font-size: 1rem;
                padding: 10px;
            }

            button {
                font-size: 0.9rem;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-button" onclick="goToLogin()">← กลับไปยังหน้า Login</button>
        <button class="details-button" onclick="showBookingDetails()">📋 แสดงรายละเอียดผู้จอง</button>
        <h2>⚽ สถานะของสนามทั้งหมด ⚽</h2>
        <table>
            <thead>
                <tr>
                    <th>สนามที่</th>
                    <th>สถานะ</th>
                    <th>เวลาเริ่ม</th>
                    <th>เวลาสิ้นสุด</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="fieldTable">
            </tbody>
        </table>
        <button class="logout-button" onclick="logout()">🚪 ออกจากระบบ</button>
    </div>

    <script>
         function logout() {
            window.location.href = "login.html";
        }
        function goToLogin() {
            window.location.href = "login.html";
        }

        const fields = [
            { id: 1, status: "available", startTime: "", endTime: "", user: {} },
            { id: 2, status: "booked", startTime: "14:00", endTime: "15:30", user: { name: "สมชาย", phone: "0812345678", email: "somchai@example.com" } },
            { id: 3, status: "available", startTime: "", endTime: "", user: {} },
            { id: 4, status: "booked", startTime: "16:00", endTime: "17:30", user: { name: "กานต์", phone: "0912345678", email: "karn@example.com" } },
            { id: 5, status: "available", startTime: "", endTime: "", user: {} }
        ];

        function renderTable() {
            const tableBody = document.getElementById("fieldTable");
            tableBody.innerHTML = "";

            fields.forEach(field => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>สนามที่ ${field.id}</td>
                    <td class="${field.status}">${field.status === "available" ? "ว่าง" : "จองแล้ว"}</td>
                    <td>${field.startTime || "-"}</td>
                    <td>${field.endTime || "-"}</td>
                    <td>
                        <button class="${field.status === "available" ? "btn-booked" : "btn-available"}" onclick="toggleBooking(${field.id})">
                            ${field.status === "available" ? "จองสนาม" : "ยกเลิกการจอง"}
                        </button>
                    </td>
                `;

                tableBody.appendChild(row);
            });
        }

        function toggleBooking(id) {
            const field = fields.find(f => f.id === id);

            if (field.status === "available") {
                field.user.name = prompt("ชื่อผู้จอง:");
                field.user.phone = prompt("เบอร์โทร:");
                field.user.email = prompt("Email:");
                field.startTime = prompt("เวลาเริ่ม (HH:MM):");
                field.endTime = prompt("เวลาสิ้นสุด (HH:MM):");

                field.status = "booked";
            } else {
                field.status = "available";
                field.user = {};
                field.startTime = "";
                field.endTime = "";
            }

            renderTable();
        }

        function showBookingDetails() {
            const bookedFields = fields.filter(field => field.status === "booked");
            if (bookedFields.length === 0) {
                alert("ไม่มีข้อมูลการจอง");
                return;
            }

            let details = bookedFields.map(field => 
                `สนามที่ ${field.id}\nชื่อ: ${field.user.name}\nเบอร์: ${field.user.phone}\nEmail: ${field.user.email}\nเวลา: ${field.startTime} - ${field.endTime}\n\n`
            ).join("");

            alert(details);
            
       
        }

        document.addEventListener("DOMContentLoaded", renderTable);
    </script>
</body>
</html>
