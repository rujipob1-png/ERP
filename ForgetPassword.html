<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Football Field Booking</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('img/b6a1c132-a9e1-4d4f-b927-ab271dd593ef.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #1b5e20;
        }

        .container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #1b5e20;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            width: 100%;
            height: 45px;
            padding: 10px;
            border: 2px solid #c8e6c9;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #81c784;
            outline: none;
        }

        button {
            background-color: white;
            color: #1b5e20;
            padding: 10px;
            border: 2px solid #1b5e20;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        button:hover {
            background-color: #1b5e20;
            color: white;
        }

        .link {
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .link a {
            color: #1b5e20;
            text-decoration: none;
            font-weight: bold;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Forgot Password</h2>
        <form action="#" method="post">
            <p>Please enter your registered email address to reset your password.</p>
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Submit</button>
        </form>
        <div class="link">
            <p><a href="Login.html">Back to Login</a></p>
        </div>
    </div>
</body>
</html>
